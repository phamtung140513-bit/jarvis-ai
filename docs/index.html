<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TungDevAI - Chat</title>
  <meta name="description" content="TungDevAI coding chat - Dang nhap email hoac Google" />
  <meta name="theme-color" content="#212121" />
  <script>
    (function () {
      var p = location.pathname;
      if (p.length > 1 && !p.endsWith("/") && !/\.html?$/i.test(p)) {
        location.replace(p + "/" + location.search + location.hash);
      }
    })();
  </script>
  <link rel="icon" href="assets/icon.jpg" type="image/jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="chat.css?v=13" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <!-- Auth gate — like ChatGPT / Claude / Gemini -->
  <div id="authGate" class="auth-gate">
    <div class="auth-card">
      <img src="assets/bot-avatar.jpg" alt="TungDevAI" class="auth-logo" />
      <h1>TungDevAI</h1>
      <p class="auth-sub">Senior coding assistant. Dang nhap de bat dau.</p>

      <div class="auth-tabs" role="tablist">
        <button type="button" class="auth-tab active" id="tabLogin" data-tab="login">Dang nhap</button>
        <button type="button" class="auth-tab" id="tabRegister" data-tab="register">Dang ky</button>
      </div>

      <!-- Login -->
      <form id="formLogin" class="auth-form" autocomplete="on">
        <label class="auth-label" for="loginEmail">Email</label>
        <input class="auth-input" id="loginEmail" type="email" placeholder="ban@email.com" required autocomplete="email" />
        <label class="auth-label" for="loginPassword">Mat khau</label>
        <input class="auth-input" id="loginPassword" type="password" placeholder="Mat khau" required minlength="6" autocomplete="current-password" />
        <button type="submit" class="auth-primary" id="btnLoginSubmit">Dang nhap</button>
      </form>

      <!-- Register -->
      <form id="formRegister" class="auth-form hidden" autocomplete="on">
        <label class="auth-label" for="regName">Ten hien thi</label>
        <input class="auth-input" id="regName" type="text" placeholder="Ten cua ban" maxlength="80" autocomplete="name" />
        <label class="auth-label" for="regEmail">Email</label>
        <input class="auth-input" id="regEmail" type="email" placeholder="ban@email.com" required autocomplete="email" />
        <label class="auth-label" for="regPassword">Mat khau</label>
        <input class="auth-input" id="regPassword" type="password" placeholder="Toi thieu 6 ky tu" required minlength="6" autocomplete="new-password" />

        <div class="auth-code-row">
          <div class="auth-code-field">
            <label class="auth-label" for="regCode">Ma xac thuc</label>
            <input class="auth-input" id="regCode" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder="6 so tu email" autocomplete="one-time-code" />
          </div>
          <button type="button" class="auth-secondary" id="btnSendCode">Gui ma</button>
        </div>
        <p class="auth-hint" id="codeHint"></p>
        <button type="submit" class="auth-primary" id="btnRegisterSubmit">Tao tai khoan</button>
      </form>

      <div class="auth-divider"><span>hoac</span></div>

      <div id="googleBtnWrap" class="google-btn-wrap"></div>
      <button type="button" class="auth-google-fallback hidden" id="btnGoogleFallback">Tiep tuc voi Google</button>

      <p class="auth-hint" id="authHint"></p>
      <p class="auth-err hidden" id="authErr"></p>
      <p class="auth-ok hidden" id="authOk"></p>
      <p class="auth-foot">Email + ma xac thuc, hoac Google — giong cac AI tren thi truong.</p>
    </div>
  </div>

  <div class="app hidden" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <button type="button" class="btn new-chat" id="btnNew" title="Chat moi">
          <span class="ico">+</span> Chat moi
        </button>
        <button type="button" class="icon-btn mobile-only" id="btnCloseSidebar" aria-label="Dong">X</button>
      </div>

      <div class="history" id="history" aria-label="Lich su"></div>

      <div class="sidebar-bottom">
        <a class="side-link" href="landing.html">Trang gioi thieu</a>
        <a class="side-link" id="tgLink" href="https://t.me/grokapiai_bot" target="_blank" rel="noopener">Bot Telegram</a>
        <button type="button" class="side-link as-btn" id="btnLogout">Dang xuat</button>
        <!-- Click when logged out = open login; when logged in = user info -->
        <button type="button" class="user-chip as-btn" id="userChipBtn" title="Tai khoan">
          <img src="assets/bot-avatar.jpg" alt="" width="28" height="28" id="userAvatar" />
          <div class="user-chip-text">
            <div class="user-name" id="appNameLabel">TungDevAI</div>
            <div class="user-sub" id="modelChip">Dang nhap</div>
          </div>
        </button>
      </div>
    </aside>

    <div class="sidebar-backdrop" id="backdrop" hidden></div>

    <main class="main">
      <header class="topbar">
        <button type="button" class="icon-btn mobile-only" id="btnOpenSidebar" aria-label="Menu">=</button>
        <div class="topbar-title">
          <span id="chatTitle">TungDevAI</span>
          <span class="dot" id="statusDot" title="Trang thai"></span>
        </div>
        <button type="button" class="user-pill as-btn" id="userPill" title="Tai khoan">
          <img id="userPillImg" alt="" width="24" height="24" src="assets/bot-avatar.jpg" />
          <span id="userPillName">Dang nhap</span>
        </button>
      </header>

      <section class="messages" id="messages" aria-live="polite">
        <div class="welcome" id="welcome">
          <img class="welcome-avatar" src="assets/bot-avatar.jpg" alt="TungDevAI" />
          <h1>TungDevAI</h1>
          <p>Senior coding assistant. Xin chao <strong id="welcomeName">ban</strong>!</p>
          <div class="suggestions">
            <button type="button" data-q="Viet API FastAPI CRUD user (SQLAlchemy + Pydantic), co error handling">FastAPI CRUD</button>
            <button type="button" data-q="Review code Python ve bug va security (toi se paste code)">Code review</button>
            <button type="button" data-q="Giai thich traceback va dua patch (toi se paste log)">Debug</button>
            <button type="button" data-q="Thiet ke kien truc bot Telegram SaaS multi-user">Kien truc bot</button>
          </div>
        </div>
      </section>

      <div class="composer-wrap">
        <div class="attach-preview" id="attachPreview" hidden></div>
        <form class="composer" id="form">
          <input type="file" id="fileImage" accept="image/*" multiple hidden />
          <div class="plus-wrap" id="plusWrap">
            <button type="button" class="plus-btn" id="btnPlus" title="Anh tu may" aria-label="Them anh">
              <span class="plus-glyph">+</span>
            </button>
          </div>
          <textarea id="input" rows="1" placeholder="Nhan tin cho TungDevAI..." autocomplete="off" enterkeyhint="send"></textarea>
          <button type="submit" id="btnSend" aria-label="Gui" title="Gui">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </form>
        <p class="disclaimer">Dang nhap email (ma xac thuc) hoac Google — giong ChatGPT / Claude.</p>
      </div>
    </main>
  </div>

  <script src="chat.js?v=13"></script>
</body>
</html>
